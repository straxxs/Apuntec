<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - KIROKU</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/panel.css') }}">
</head>
<body>
<div class="doodles">
    <span class="d1">✏️</span>
    <span class="d2">📝</span>
    <span class="d3">📚</span>
    <span class="d4">⭐</span>
    <span class="d5">📎</span>
    <span class="d6">🗒️</span>
    <span class="d7">🎓</span>
    <span class="d8">💡</span>
    <span class="d9">📖</span>
    <span class="d10">🎨</span>
    <span class="d11">🧪</span>
    <span class="d12">✂️</span>
    <span class="d13">📐</span>
    <span class="d14">🖌️</span>
    <span class="d15">🎒</span>
    <span class="d16">🔢</span>
</div>
<div class="topbar">
    <a href="/home" class="apuntec-btn"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="" class="logo-topbar"><h1>KIROKU</h1></a>
    <div class="perfil-menu">
        <img id="perfilAvatar" class="perfil-avatar"
            src="{{ url_for('static', filename=session_avatar) }}" alt="Mi avatar">

        <div id="perfilDropdown" class="dropdown-menu">
            <div class="dropdown-header">{{ nombre }}</div>
            <a href="/perfil">Mi perfil</a>
            {% if session_id_curso %}<a href="/curso/{{ session_id_curso }}">Mi curso</a>{% endif %}
            <a href="/home">Inicio</a>
            <hr>
            <a href="/logout" class="item-logout">Cerrar sesión</a>
        </div>
    </div>
</div>

<div class="wrapper">

    <div class="card">
        <h2>Usuarios</h2>
        <table>
            <thead><tr><th>ID</th><th>Nombre</th><th>Rol</th><th>Estado</th><th>Curso</th><th>Acciones</th></tr></thead>
            <tbody id="tablaUsuarios">
                <tr><td colspan="6" class="vacio">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>Todos los cursos</h2>
        <table>
            <thead><tr><th>ID</th><th>Año</th><th>División</th><th>Creador</th><th>Acciones</th></tr></thead>
            <tbody id="tablaCursos">
                <tr><td colspan="5" class="vacio">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

</div>
<script src="{{ url_for('static', filename='js/avatar.js') }}"></script>
<script src="{{ url_for('static', filename='js/topbar.js') }}"></script>
<script src="{{ url_for('static', filename='js/sounds.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/modal.js') }}"></script>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
