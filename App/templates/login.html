<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - KIROKU</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<!-- Doodles decorativos -->
<div class="doodle doodle-1" aria-hidden="true">📐</div>
<div class="doodle doodle-2" aria-hidden="true">🖍️</div>
<div class="doodle doodle-3" aria-hidden="true">📏</div>
<div class="doodle doodle-4" aria-hidden="true">📎</div>

<div class="container">
    <div class="badge" aria-hidden="true">🎓</div>

    <div class="spiral" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="titulo-wrap">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="KIROKU" class="logo-auth">
        <p class="subtitulo">Ingresá a tu cuenta</p>
    </div>

    <form id="loginForm" novalidate>
        <div class="campo">
            <label for="nombre">Usuario o email</label>
            <input type="text" id="nombre" name="nombre" placeholder="tu_usuario o tu@email.com" required
                   autocomplete="username">
        </div>
        <div class="campo">
            <label for="contraseña">Contraseña</label>
            <div class="campo-password">
                <input type="password" id="contraseña" name="contraseña" placeholder="Tu contraseña" required
                       autocomplete="current-password">
                <button type="button" class="btn-toggle-pass" aria-label="Mostrar contraseña"
                        onclick="togglePass('contraseña', this)">
                    <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>
        <button type="submit" class="btn-enviar">Iniciar sesión</button>
    </form>

    <p class="enlace-secundario"><a href="/recuperar">¿Olvidaste tu contraseña?</a></p>
    <p class="enlace-secundario">¿No tenés cuenta? <a href="/registro">Registrarse</a></p>
</div>

<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
