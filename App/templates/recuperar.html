<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - KIROKU</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<div class="doodle doodle-1" aria-hidden="true">🔑</div>
<div class="doodle doodle-2" aria-hidden="true">📧</div>
<div class="doodle doodle-3" aria-hidden="true">🔒</div>
<div class="doodle doodle-4" aria-hidden="true">✨</div>

<div class="container">
    <div class="badge" aria-hidden="true">🔑</div>

    <div class="spiral" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="titulo-wrap">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="KIROKU" class="logo-auth">
        <p class="subtitulo">Ingresá tu email y te mandamos un enlace para recuperar tu contraseña</p>
    </div>

    <form id="recuperarForm" novalidate>
        <div class="campo">
            <label for="email">Email registrado</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required
                   maxlength="254" autocomplete="email">
        </div>
        <button type="submit" class="btn-enviar">Enviar enlace</button>
    </form>

    <p class="enlace-secundario">¿Recordaste? <a href="/login">Volvé al login</a></p>
</div>

<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/recuperar.js') }}"></script>
</body>
</html>
