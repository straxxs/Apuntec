<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - KIROKU</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<span class="flotante flotante-1" aria-hidden="true">🔑</span>
<span class="flotante flotante-2" aria-hidden="true">📧</span>
<span class="flotante flotante-3" aria-hidden="true">🔒</span>
<span class="flotante flotante-4" aria-hidden="true">✨</span>

<div class="container">
    <div class="badge" aria-hidden="true">🔑</div>

    <div class="spiral" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="titulo-wrap">
        <h2 class="titulo">Recuperar contraseña</h2>
        <p class="subtitulo">Ingresá tu email y te enviaremos un enlace para restablecerla</p>
    </div>

    <form id="recuperarForm">
        <div class="campo">
            <label for="email">Email registrado</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required>
        </div>
        <button type="submit" class="btn-enviar">Enviar enlace</button>
    </form>

    <p class="enlace-secundario">¿Recordaste tu contraseña? <a href="/login">Iniciá sesión</a></p>
</div>

<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/recuperar.js') }}"></script>
</body>
</html>
